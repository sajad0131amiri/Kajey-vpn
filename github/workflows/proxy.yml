name: Always-On Proxy

on:
  schedule:
    - cron: '50 */5 * * *'   # هر ۵ ساعت و ۵۰ دقیقه
  workflow_dispatch:          # امکان اجرای دستی

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360      # حداکثر ۶ ساعت

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install websockets

      - name: Start proxy and serveo tunnel
        env:
          SUBDOMAIN: "kajeyiran0131"   # <-- ساب‌دامین ثابت تو
        run: |
          # ۱. اجرای پروکسی HTTP روی پورت ۱۰۸۰
          python http_proxy.py &
          sleep 2

          # ۲. ایجاد تونل SSH به serveo.net
          #    پورت 80 ریموت به 1080 لوکال وصل می‌شود
          ssh -o StrictHostKeyChecking=no -R ${SUBDOMAIN}:80:localhost:1080 serveo.net &

          sleep 5
          echo "============================================"
          echo "پروکسی فعال شد!"
          echo "آدرس: https://${SUBDOMAIN}.serveo.net"
          echo "پورت پروکسی HTTP: 443 (یا 80)"
          echo "============================================"

          # ۳. زنده نگه‌داشتن Job به مدت ۶ ساعت
          sleep 21600
