name: Always-On Proxy

on:
  schedule:
    - cron: '50 */5 * * *'   # هر ۵ ساعت و ۵۰ دقیقه
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install websockets

      - name: Start proxy and bore tunnel
        env:
          BORE_SECRET: "kajeyiran0131"   # رمز ثابت برای آدرس دائمی
        run: |
          # ۱. اجرای پروکسی HTTP روی پورت ۱۰۸۰
          python http_proxy.py &
          sleep 2

          # ۲. دانلود و اجرای bore
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz | tar xz
          chmod +x bore
          ./bore local 1080 --to bore.pub --secret $BORE_SECRET > bore_output.txt 2>&1 &
          sleep 3

          # ۳. نمایش آدرس پروکسی (فقط بار اول لازمه ببینی، بعداً ذخیره می‌کنی)
          echo "========== آدرس پروکسی HTTP =========="
          grep -oP 'listening at \K[^ ]+' bore_output.txt || echo "منتظر دریافت آدرس..."
          echo "======================================="

          # ۴. زنده نگه‌داشتن Job به مدت ۶ ساعت
          sleep 21600
