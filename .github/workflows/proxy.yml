name: Permanent Proxy via Codespace

on:
  schedule:
    - cron: '50 */5 * * *'
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set GH_TOKEN for gh CLI
        run: echo "GH_TOKEN=${{ secrets.GH_PAT }}" >> $GITHUB_ENV

      - name: Create Codespace
        id: create
        run: |
          # ایجاد codespace و گرفتن خروجی کامل
          CREATE_OUTPUT=$(gh codespace create \
            --repo $GITHUB_REPOSITORY \
            --branch main \
            --machine basicLinux32gb 2>&1)
          echo "$CREATE_OUTPUT"

          # روش اول: آخرین خط خروجی معمولاً نام codespace است
          CODESPACE_NAME=$(echo "$CREATE_OUTPUT" | tail -1 | tr -d '\r')

          # اگر خالی بود یا شامل فاصله بود (خطای احتمالی)، از gh codespace list کمک بگیر
          if [ -z "$CODESPACE_NAME" ] || [[ "$CODESPACE_NAME" == *" "* ]]; then
            echo "تلاش برای دریافت نام codespace از لیست..."
            CODESPACE_NAME=$(gh codespace list --repo $GITHUB_REPOSITORY --limit 1 2>/dev/null | awk 'NR>1 {print $1}')
          fi

          # اگر همچنان خالی بود، خطا بده
          if [ -z "$CODESPACE_NAME" ]; then
            echo "Failed to get codespace name"
            exit 1
          fi

          echo "codespace_name=$CODESPACE_NAME" >> $GITHUB_OUTPUT
          echo "Created codespace: $CODESPACE_NAME"

      - name: Wait for Codespace to be ready
        run: |
          CODESPACE_NAME=${{ steps.create.outputs.codespace_name }}
          for i in {1..30}; do
            STATE=$(gh codespace list --repo $GITHUB_REPOSITORY 2>/dev/null | grep "$CODESPACE_NAME" | awk '{print $2}')
            if [ "$STATE" = "Available" ]; then
              echo "Codespace is ready."
              break
            fi
            echo "Waiting... state=$STATE"
            sleep 10
          done

      - name: Install dependencies and start proxy inside Codespace
        run: |
          CODESPACE_NAME=${{ steps.create.outputs.codespace_name }}
          gh codespace ssh --codespace $CODESPACE_NAME --command "pip install websockets && nohup python3 http_proxy.py > proxy.log 2>&1 &"
          sleep 2
          echo "Proxy started inside codespace."

      - name: Make port 1080 public
        run: |
          CODESPACE_NAME=${{ steps.create.outputs.codespace_name }}
          gh codespace ports visibility 1080:public --codespace $CODESPACE_NAME
          echo "Port 1080 is now public."

      - name: Get public URL and keep alive
        run: |
          CODESPACE_NAME=${{ steps.create.outputs.codespace_name }}
          PROXY_URL="https://${CODESPACE_NAME}-1080.preview.app.github.dev"
          echo "============================================"
          echo "پروکسی HTTP عمومی تو:"
          echo "$PROXY_URL"
          echo "از این آدرس به عنوان پروکسی (Host) استفاده کن"
          echo "پورت: 443"
          echo "============================================"
          
          sleep 21600
