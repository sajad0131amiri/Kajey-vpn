name: Always-On Proxy

on:
  schedule:
    - cron: '50 */5 * * *'   # هر ۵ ساعت و ۵۰ دقیقه
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install websockets

      - name: Start proxy server
        run: |
          python http_proxy.py &
          sleep 3
          echo "Proxy server started"

      - name: Expose tunnel
        id: expose-tunnel
        uses: codetalkio/expose-tunnel@v1
        with:
          service: bore.pub
          port: 1080

      - name: Print tunnel URL
        run: |
          echo "============================================"
          echo "پروکسی فعال شد!"
          echo "آدرس تونل (کپی کن): ${{ steps.expose-tunnel.outputs.tunnel-url }}"
          echo "از این آدرس به عنوان پروکسی HTTP استفاده کن"
          echo "============================================"

      - name: Keep alive
        run: sleep 21600
