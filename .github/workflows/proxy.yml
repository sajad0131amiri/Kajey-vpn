name: Test Codespace Tunnel

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest
    steps:
      - name: Create temporary Codespace via API
        id: codespace
        run: |
          # ساخت Codespace روی همین مخزن (branch main)
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/codespaces \
            -d '{"ref":"main","machine":"basicLinux32gb"}')
          
          # استخراج نام و ID
          CODESPACE_NAME=$(echo "$RESPONSE" | jq -r '.name')
          echo "codespace_name=$CODESPACE_NAME" >> $GITHUB_OUTPUT
          
          # صبر کن تا آماده بشه (حداکثر ۲ دقیقه)
          for i in {1..24}; do
            STATE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
              https://api.github.com/repos/${{ github.repository }}/codespaces/$CODESPACE_NAME \
              | jq -r '.state')
            if [ "$STATE" = "Available" ]; then
              break
            fi
            sleep 10
          done

      - name: Start proxy inside Codespace via SSH
        run: |
          # دریافت دستور ssh از API
          SSH_CMD=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/codespaces/${{ steps.codespace.outputs.codespace_name }} \
            | jq -r '.ssh_command')
          
          # اجرای دستورات نصب و اجرای پروکسی
          eval "$SSH_CMD" << 'EOF'
            pip install websockets
            nohup python3 http_proxy.py &
            sleep 3
          EOF

      - name: Forward port 1080 as public
        run: |
          CODESPACE_NAME=${{ steps.codespace.outputs.codespace_name }}
          curl -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/codespaces/$CODESPACE_NAME/ports/1080 \
            -d '{"visibility":"public"}'

      - name: Get tunnel URL
        run: |
          CODESPACE_NAME=${{ steps.codespace.outputs.codespace_name }}
          URL=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/codespaces/$CODESPACE_NAME \
            | jq -r '.environment.web_url' | sed 's|https://|https://|')
          TUNNEL_URL="${URL}1080.preview.app.github.dev"
          echo "========================================="
          echo "پروکسی عمومی (تست کن): $TUNNEL_URL"
          echo "========================================="

      - name: Keep alive for 30 minutes
        run: sleep 1800
