name: Permanent Proxy via Codespace

on:
  schedule:
    - cron: '50 */5 * * *'   # هر ۵ ساعت و ۵۰ دقیقه
  workflow_dispatch:

jobs:
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GH_PAT }}" | gh auth login --with-token

      - name: Create Codespace
        id: create
        run: |
          CODESPACE_NAME=$(gh codespace create \
            --repo $GITHUB_REPOSITORY \
            --branch main \
            --machine basicLinux32gb \
            --json name -q '.name')
          echo "codespace_name=$CODESPACE_NAME" >> $GITHUB_OUTPUT
          echo "Created codespace: $CODESPACE_NAME"

      - name: Wait for Codespace to be ready
        run: |
          CODESPACE_NAME=${{ steps.create.outputs.codespace_name }}
          for i in {1..30}; do
            STATE=$(gh codespace list --repo $GITHUB_REPOSITORY --json name,state -q ".[] | select(.name==\"$CODESPACE_NAME\") | .state")
            if [ "$STATE" = "Available" ]; then
              echo "Codespace is ready."
              break
            fi
            echo "Waiting... ($STATE)"
            sleep 10
          done

      - name: Install dependencies and start proxy inside Codespace
        run: |
          CODESPACE_NAME=${{ steps.create.outputs.codespace_name }}
          gh codespace ssh --codespace $CODESPACE_NAME --command "pip install websockets && nohup python3 http_proxy.py > proxy.log 2>&1 &"
          sleep 2
          echo "Proxy started inside codespace."

      - name: Make port 1080 public
        run: |
          CODESPACE_NAME=${{ steps.create.outputs.codespace_name }}
          gh codespace ports visibility 1080:public --codespace $CODESPACE_NAME
          echo "Port 1080 is now public."

      - name: Get public URL and keep alive
        run: |
          CODESPACE_NAME=${{ steps.create.outputs.codespace_name }}
          # فرمول آدرس عمومی
          PROXY_URL="https://${CODESPACE_NAME}-1080.preview.app.github.dev"
          echo "============================================"
          echo "پروکسی HTTP عمومی تو:"
          echo "$PROXY_URL"
          echo "از این آدرس به عنوان پروکسی (Host) استفاده کن"
          echo "پورت: 443"
          echo "============================================"
          
          # زنده نگه داشتن Job (و در نتیجه پروکسی) به مدت ۶ ساعت
          sleep 21600
